<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vseyn.ru - импорт</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0&family=Roboto+Condensed:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/icons/figma-icons.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="site">
      <header class="header">
        <a class="logo" href="#">vseyn.ru</a>

        <nav class="menu">
          <button class="menu-link" type="button">
            <i class="icon icon-managers menu-icon" aria-hidden="true"></i>
            <span>Журнал менеджеров</span>
          </button>

          <button class="menu-link" type="button">
            <i class="icon icon-resume menu-icon" aria-hidden="true"></i>
            <span>Резюме</span>
          </button>

          <button class="menu-link" type="button">
            <i class="icon icon-companies menu-icon" aria-hidden="true"></i>
            <span>Компании</span>
          </button>

          <button class="menu-link active" type="button">
            <i class="icon icon-import menu-icon" aria-hidden="true"></i>
            <span>Импорт</span>
          </button>

          <button class="menu-link" type="button">
            <i class="icon icon-ads menu-icon" aria-hidden="true"></i>
            <span>Объявления</span>
          </button>

          <button class="menu-link" type="button">
            <i class="icon icon-email menu-icon" aria-hidden="true"></i>
            <span>Email письма</span>
          </button>

          <button class="menu-link" type="button">
            <i class="icon icon-settings menu-icon" aria-hidden="true"></i>
            <span>Email настройки</span>
          </button>
        </nav>
      </header>

      <main class="page">
      <section class="top-panel">
        <h1>Импорт&nbsp; из xml/xlsx/dosx</h1>

        <div class="dates">
          <div class="date-box">
            <span>Дата от</span>
            <b>12.05.2023</b>
          </div>
          <div class="date-box">
            <span>Дата до</span>
            <b>12.05.2023</b>
          </div>
        </div>

        <div class="form-line">
          <label class="form-field file-type">
            <span class="label">Укажите тип файла</span>
            <span class="select-box">
              <span>&nbsp;</span>
              <span class="material-symbols-outlined arrow">expand_more</span>
            </span>
          </label>

          <label class="form-field file-path">
            <span class="label">Укажите путь к файлу</span>
            <input type="text" />
          </label>

          <button class="clip-btn" type="button" aria-label="Прикрепить файл">
            <span class="material-symbols-outlined">attach_file</span>
          </button>

          <button class="start-btn" type="button">Начать Импорт</button>
        </div>
      </section>

      <div class="empty-line"></div>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
